# Ashkenazi | n=1000 | Random mating (di) | 12 pedigree gens | 50 replicates

# ── Housekeeping ──────────────────────────────────────────────────────────────
base_dir: ibd_sims
dir_name: ibd-sims
keep_all_files: false

# ── Computational resources (simulation) ─────────────────────────────────────
gb: 6
sim_min: 30
nthreads: 8

# ── Simulation ────────────────────────────────────────────────────────────────
hapmap_chr1: /users/cwilli50/reference/geneticMap-GRCh37/genetic_map_GRCh37_chr1.txt.gz

custom_demo:
  object: ashkenazi
  path: ibd_sims/demography.py

custom_sim:
  object: null
  path: null

end_chr: 30
iter: 50
samples: 1000

pedigree:
  pedigree_mode: true
  mating: di
  gen_end: 12
  pedigree_file: null

label: 'ashkenazi
  n=1000
  DTWF (di)
  unfiltered'

# ── Post-processing ───────────────────────────────────────────────────────────
post_process: null  # ibdne,hapne_ibd,hapne_ld,purple_nodes

# Default resources for post-processing jobs (override per module below)
workers: 8
mem_gb: 16
time_min: 120

ibdne:
  path: ibd_sims/post_modules.py
  object: PostProcessIBDNe
  ibd_filter: null
  filtersamples: false
  mincm: 2
  trimcm: 0.2
  gmin: 1
  gmax: 300
  nboots: 80
  nits: 1000
  npairs: 0
  workers: 8
  mem_gb: 16
  time_min: 120

hapne_ibd:
  path: ibd_sims/post_modules.py
  object: PostProcessHapNeIBD
  filter: unfiltered
  workers: 4
  mem_gb: 16
  time_min: 120

hapne_ld:
  path: ibd_sims/post_modules.py
  object: PostProcessHapNeLD
  filter: unfiltered
  workers: 4
  mem_gb: 16
  time_min: 120

purple_nodes:
  path: ibd_sims/post_modules.py
  object: PostProcessPurple
  workers: 4
  mem_gb: 8
  time_min: 60
