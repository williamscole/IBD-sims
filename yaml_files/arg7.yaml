# Quebec empirical | n=10000 | Coalescent | 22 real autosomes | 1 replicate

# ── Housekeeping ──────────────────────────────────────────────────────────────
base_dir: ibd_sims
dir_name: ibd-sims
keep_all_files: false

# ── Computational resources (simulation) ─────────────────────────────────────
gb: 32
sim_min: 30
nthreads: 8

# ── Simulation ────────────────────────────────────────────────────────────────
hapmap_chr1: /users/cwilli50/reference/geneticMap-GRCh37/genetic_map_GRCh37_chr1.txt.gz

custom_demo:
  object: null
  path: null

custom_sim:
  object: load_random_10000
  path: ibd_sims/load_quebec.py

end_chr: 22
iter: 1
samples: 10000

pedigree:
  pedigree_mode: false
  mating: di
  gen_end: 25
  pedigree_file: null

label: 'load_random_10000
  n=10000
  coalescent
  unfiltered'

# ── Post-processing ───────────────────────────────────────────────────────────
post_process: null  # ibdne,hapne_ibd,hapne_ld,purple_nodes

# Default resources for post-processing jobs (override per module below)
workers: 8
mem_gb: 16
time_min: 120

ibdne:
  path: post_modules.py
  object: PostProcessIBDNe
  ibd_filter: null
  filtersamples: false
  mincm: 2
  trimcm: 0.2
  gmin: 1
  gmax: 300
  nboots: 80
  nits: 1000
  npairs: 0
  workers: 8
  mem_gb: 32
  time_min: 180

hapne_ibd:
  path: post_modules.py
  object: PostProcessHapNeIBD
  filter: unfiltered
  workers: 4
  mem_gb: 16
  time_min: 120

hapne_ld:
  path: post_modules.py
  object: PostProcessHapNeLD
  filter: unfiltered
  workers: 4
  mem_gb: 16
  time_min: 120

purple_nodes:
  path: post_modules.py
  object: PostProcessPurple
  workers: 4
  mem_gb: 8
  time_min: 60
